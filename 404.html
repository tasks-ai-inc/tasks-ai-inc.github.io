<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex">
<title>Page not found — Tasks.AI</title>
<link rel="icon" type="image/png" href="assets/logo_mark_transparent.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&family=Manrope:wght@400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0B0B14; --bg-deep:#08080F; --text:#F4F4F8; --dim:#9A9DAD; --faint:#6B6E7D;
         --hairline:rgba(255,255,255,0.09); --surface-2:rgba(255,255,255,0.035);
         --grad:linear-gradient(100deg,#38C6F4 0%,#6B7BFA 46%,#A857F2 100%);
         --disp:'Space Grotesk',system-ui,sans-serif; --body:'Manrope',system-ui,sans-serif; --mono:'JetBrains Mono',monospace; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; height:100%; }
  body{ background:radial-gradient(120% 90% at 50% -10%, #0f1020 0%, var(--bg-deep) 55%, var(--bg) 100%);
        color:var(--text); font-family:var(--body); display:flex; align-items:center; justify-content:center;
        padding:2rem; text-align:center; line-height:1.6; -webkit-font-smoothing:antialiased; }
  .wrap{ max-width:560px; }
  .mark{ height:46px; width:auto; margin:0 auto 26px; display:block; filter:drop-shadow(0 10px 30px rgba(104,123,250,0.45)); }
  .code{ font-family:var(--mono); font-size:.74rem; letter-spacing:.2em; text-transform:uppercase; color:var(--faint); margin-bottom:1rem; }
  h1{ font-family:var(--disp); font-size:2.1rem; font-weight:600; letter-spacing:-0.02em; margin:0 0 .7rem; }
  p{ color:var(--dim); margin:0 0 1.9rem; }
  .home a{ font-family:var(--body); font-weight:600; color:#fff; background:var(--grad); text-decoration:none;
           padding:.8rem 1.5rem; border-radius:14px; display:inline-block; box-shadow:0 10px 30px rgba(104,123,250,0.32); }
</style>
</head>
<body>
  <div class="wrap">
    <img class="mark" src="assets/logo_mark_transparent.png" alt="Tasks.AI">
    <div class="code">404 — Page not found</div>
    <h1>This page doesn't exist</h1>
    <p>The page you're looking for may have moved. Teach once, automate forever — let's get you back.</p>
    <div class="home"><a data-home href="/">← Back to Tasks.AI</a></div>
  </div>
</body>
</html>
